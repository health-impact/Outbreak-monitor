name: تحديث بيانات WHO لموقع أثر رصد

on:
  schedule:
    # كل ساعة — بيانات WHO لا تتغير كل 5 دقائق فعلياً، هذا معدّل واقعي وكافٍ للرصد
    - cron: "0 * * * *"
  workflow_dispatch: {}   # يسمح بالتشغيل اليدوي من تبويب Actions في أي وقت
  push:
    branches: [ main ]     # يشغّل السكربت أيضاً عند أي رفع للمستودع

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run WHO data updater
        run: python update_who_data.py

      - name: Commit updated data if changed
        run: |
          git config user.name "athar-rasd-bot"
          git config user.email "actions@github.com"
          git add who_data.json
          git diff --staged --quiet || git commit -m "تحديث تلقائي لبيانات WHO"
          git push
